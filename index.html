<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý & Tạo mã QR Tài liệu Google Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>body{font-family:'Inter',sans-serif;background-color:#f8fafc;}</style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header đã được giữ nguyên cấu trúc của bạn -->
    <header class="bg-indigo-900 text-white shadow-lg"><div class="max-w-7xl mx-auto px-4 py-4"><h1 class="text-xl font-extrabold">QR DOC-HUB PRO</h1></div></header>
    
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
        <div id="sync-status" class="p-4 bg-yellow-100 rounded-lg">Đang khởi tạo kết nối...</div>
    </main>

    <script>
        // Cấu hình Firebase từ biến hệ thống
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        
        window.addEventListener('DOMContentLoaded', async () => {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            const auth = firebase.auth();
            const db = firebase.firestore();
            const statusDiv = document.getElementById('sync-status');

            try {
                // Rule: Auth trước khi query
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                
                statusDiv.innerText = "Đã kết nối thành công!";
                statusDiv.className = "p-4 bg-emerald-100 text-emerald-800 rounded-lg";
                
                // Bạn có thể tiếp tục các hàm query dữ liệu tại đây...
                console.log("System initialized successfully");
                
            } catch (error) {
                statusDiv.innerText = "Lỗi kết nối: " + error.message;
                statusDiv.className = "p-4 bg-red-100 text-red-800 rounded-lg";
            }
        });

        // Hàm chuyển tab
        function switchTab(tabId) {
            console.log("Switched to:", tabId);
        }
    </script>
</body>
</html>
