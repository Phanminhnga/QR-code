<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống QR DOC-HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div id="status" class="p-4 mb-4 rounded-lg bg-blue-100 text-blue-800 text-sm">Đang khởi tạo kết nối...</div>
        
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 class="text-2xl font-bold mb-6 text-gray-800">Danh sách tài liệu</h1>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
                            <th class="p-3 border-b">Mã HC</th>
                            <th class="p-3 border-b">Tên tài liệu</th>
                            <th class="p-3 border-b">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-gray-700">
                        <!-- Dữ liệu sẽ đổ vào đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'demo-app';

        async function init() {
            const status = document.getElementById('status');
            try {
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                const auth = firebase.auth();
                const db = firebase.firestore();

                await auth.signInAnonymously();
                status.innerText = "Đã kết nối dữ liệu thành công!";
                status.className = "p-4 mb-4 rounded-lg bg-green-100 text-green-800 text-sm";

                const path = ['artifacts', appId, 'public', 'data', 'documents'];
                db.collection(path.join('/')).onSnapshot((snapshot) => {
                    const tbody = document.getElementById('table-body');
                    tbody.innerHTML = '';
                    
                    if (snapshot.empty) {
                        tbody.innerHTML = '<tr><td colspan="3" class="p-4 text-center text-gray-500">Chưa có dữ liệu.</td></tr>';
                        return;
                    }

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        const row = document.createElement('tr');
                        row.className = "border-b hover:bg-gray-50";
                        row.innerHTML = `
                            <td class="p-3 font-medium">${data.code || ''}</td>
                            <td class="p-3">${data.name || ''}</td>
                            <td class="p-3">
                                ${data.link ? 
                                    `<a href="${data.link}" target="_blank" class="bg-blue-600 text-white px-4 py-1.5 rounded-md text-sm hover:bg-blue-700 transition">Xem</a>` 
                                    : '<span class="text-gray-400 text-sm">Chưa có link</span>'}
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                }, (err) => {
                    status.innerText = "Lỗi dữ liệu: " + err.message;
                    status.className = "p-4 mb-4 rounded-lg bg-red-100 text-red-800 text-sm";
                });

            } catch (e) {
                status.innerText = "Lỗi cấu hình Firebase: " + e.message;
            }
        }
        window.onload = init;
    </script>
</body>
</html>
